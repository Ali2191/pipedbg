name: Python CI

on:
  push:
    branches: [main]

env:
  PYTHONPATH: .

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Run linter
        run: |
          echo "Skipping lint in local parity workflow"

      - name: Run tests
        run: |
          echo "Running pytest..."
          pytest tests/test_pipedbg.py -v --tb=short

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          echo "Building Docker image..."
          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker not installed on host; skipping image build in local parity run."
            exit 0
          fi
          docker build -t myapp:latest .

      - name: Smoke test
        # breakpoint
        run: |
          echo "Running smoke test against built image..."
          if ! command -v docker >/dev/null 2>&1; then
            echo "Docker not installed on host; skipping smoke test in local parity run."
            exit 0
          fi
          docker run --rm myapp:latest python -c "import parser, runner, cli; print('OK')"
