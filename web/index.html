<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, minimum-scale=1.0, user-scalable=yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="pipedbg" />
    <meta name="theme-color" content="#0f1720" />
    <title>pipedbg UI</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      /* Touch-friendly adjustments */
      @supports (padding: max(0px)) {
        body {
          padding-left: max(0px, env(safe-area-inset-left));
          padding-right: max(0px, env(safe-area-inset-right));
          padding-top: max(0px, env(safe-area-inset-top));
          padding-bottom: max(0px, env(safe-area-inset-bottom));
        }
      }
      
      /* Prevent text selection on long press */
      .step, .job, .badge {
        -webkit-user-select: none;
        user-select: none;
      }
      
      /* Touch feedback */
      button:active {
        opacity: 0.8;
      }
      
      .step:active {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>pipedbg</h1>
        <p id="subtitle">CI Debugger UI</p>
      </div>
      <div class="actions">
        <button id="runBtn" title="Run the pipeline">Run Pipeline</button>
        <button id="shareBtn" title="Copy session share URL">Copy Share URL</button>
      </div>
    </header>

    <!-- Error notification panel -->
    <div id="errorPanel" class="error-panel hidden" role="alert">
      <div class="error-container">
        <span id="errorMessage" class="error-text"></span>
        <button class="error-close" onclick="closeError()" aria-label="Close" title="Close">×</button>
      </div>
    </div>

    <!-- Loading indicator -->
    <div id="loadingPanel" class="loading-panel hidden" role="status" aria-live="polite">
      <div class="spinner"></div>
      <p>Running pipeline...</p>
    </div>

    <main class="layout">
      <section class="panel dag-panel">
        <h2>Pipeline DAG</h2>
        <div id="dag" role="region" aria-label="Pipeline DAG visualization"></div>
      </section>

      <section class="panel side-panel">
        <h2>Step Inspector</h2>
        <div id="stepInfo">Select a step to inspect env vars and toggle breakpoints.</div>
        <pre id="envBox" role="region" aria-label="Environment variables"></pre>
      </section>

      <section class="panel timeline-panel">
        <h2>Timeline</h2>
        <div id="timeline" role="region" aria-label="Execution timeline"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
