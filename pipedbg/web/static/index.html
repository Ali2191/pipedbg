<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pipedbg UI</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/vis-network.min.css"
    />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>pipedbg</h1>
        <span id="workflowName" class="muted">Loading workflow...</span>
      </div>
      <div class="controls">
        <select id="workflowSelect"></select>
        <button id="runBtn">Run</button>
        <button id="cancelBtn" class="secondary">Cancel</button>
        <button id="shareBtn" class="secondary">Share</button>
        <span id="statusBadge" class="badge pending">idle</span>
        <span id="timer" class="muted">00:00</span>
      </div>
    </header>

    <main class="layout">
      <section class="panel left">
        <h2>Pipeline DAG</h2>
        <div id="dag" class="dag"></div>
      </section>

      <section class="panel right">
        <div class="right-top">
          <h2 id="selectedJob">Steps</h2>
          <div id="stepList" class="step-list"></div>
        </div>
        <div class="right-bottom">
          <div class="log-header">
            <h3 id="selectedStep">Logs</h3>
            <span id="logStatus" class="muted"></span>
          </div>
          <pre id="logPanel" class="log-panel"></pre>
        </div>
      </section>
    </main>

    <div id="breakpointBar" class="breakpoint-bar hidden">
      <span id="breakpointMsg">Breakpoint hit</span>
      <button id="resumeBtn">Resume</button>
      <button id="skipBtn" class="secondary">Skip Step</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/vis-network.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
